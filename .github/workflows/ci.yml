name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.97.1
          components: clippy,rustfmt
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Rust formatting
        run: cargo fmt --all -- --check
      - name: Rust lint
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
      - name: Rust tests
        run: cargo test --workspace --all-features --locked
      - name: Web dependencies
        working-directory: web
        run: npm ci
      - name: Web build
        working-directory: web
        run: npm run build
      - name: Container build
        run: docker build --tag pg2cb-ci:${{ github.sha }} .

  postgres-18:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.97.1
      - uses: Swatinem/rust-cache@v2
      - name: Start PostgreSQL 18
        run: |
          docker run --detach --rm --name pg2cb-ci-pg18 \
            --publish 127.0.0.1:55432:5432 \
            --env POSTGRES_PASSWORD=pg2cb_test_only \
            --env POSTGRES_DB=source \
            postgres:18.4-alpine \
            -c wal_level=logical \
            -c max_replication_slots=16 \
            -c max_wal_senders=16
          for attempt in $(seq 1 30); do
            if docker exec pg2cb-ci-pg18 pg_isready --username postgres --dbname source; then
              exit 0
            fi
            sleep 1
          done
          docker logs pg2cb-ci-pg18
          exit 1
      - name: PostgreSQL 18 integration tests
        env:
          PG2CB_TEST_SOURCE_DSN: postgresql://postgres:pg2cb_test_only@127.0.0.1:55432/source
        run: cargo test --locked -p cloudberry-etl-source-postgres --test postgres18 -- --ignored --test-threads=1
      - name: Stop PostgreSQL 18
        if: always()
        run: docker stop pg2cb-ci-pg18 || true


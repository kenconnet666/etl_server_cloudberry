name: CI

on:
  push:
    branches: [master, 'codex/**']
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  rust-checks:
    name: Rust Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-registry-

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-build-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Build workspace
        run: cargo build --workspace --all-features

      - name: Run unit tests
        run: cargo test --workspace --all-features --lib --bins
        env:
          RUST_LOG: info

  integration-pg18:
    name: PG18 Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-registry-

      - name: Start PostgreSQL 18 with logical replication
        # Plain docker run (not a service container) so the postgres -c flags for
        # logical replication are applied at startup, matching tests/integration.
        run: |
          docker run -d --name pg18 \
            -e POSTGRES_PASSWORD=pg2cb_test \
            -e POSTGRES_DB=source \
            -e POSTGRES_USER=postgres \
            -p 5432:5432 \
            postgres:18-alpine \
            -c wal_level=logical \
            -c max_replication_slots=32 \
            -c max_wal_senders=32
          for i in $(seq 1 30); do
            if docker exec pg18 pg_isready -U postgres -d source; then exit 0; fi
            sleep 2
          done
          echo "PostgreSQL did not become ready" >&2
          docker logs pg18
          exit 1

      - name: Run source-postgres integration tests
        # Only the single-node PG18 suites; citus14_pg18 needs a Citus cluster
        # (PG2CB_TEST_CITUS_COORDINATOR_DSN) that this service does not provide.
        run: |
          cargo test -p cloudberry-etl-source-postgres \
            --test postgres18 \
            --test snapshot_page_pg18 \
            --test snapshot_copy_pg18 \
            --test snapshot_slot_pg18 \
            -- --ignored --nocapture
        env:
          PG2CB_TEST_SOURCE_DSN: postgres://postgres:pg2cb_test@127.0.0.1:5432/source
          RUST_LOG: info

      - name: Run control-store integration tests
        run: cargo test -p cloudberry-etl-metadata --test control_store_pg18 -- --ignored --nocapture
        env:
          PG2CB_TEST_CONTROL_DSN: postgres://postgres:pg2cb_test@127.0.0.1:5432/source
          RUST_LOG: info

  integration-cloudberry:
    name: Cloudberry Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-registry-

      - name: Start PostgreSQL 18 source
        run: |
          docker run -d --name pg18 \
            -e POSTGRES_PASSWORD=pg2cb_test -e POSTGRES_DB=source -e POSTGRES_USER=postgres \
            -p 5432:5432 postgres:18-alpine \
            -c wal_level=logical -c max_replication_slots=32 -c max_wal_senders=32
          for i in $(seq 1 30); do
            if docker exec pg18 pg_isready -U postgres -d source; then break; fi
            sleep 2
          done

      - name: Build and initialize single-node Cloudberry 2.1
        env:
          GH_TOKEN: ${{ github.token }}
          CBDB_PORT: "55433"
        run: bash tests/integration/cloudberry/build-local-image.sh

      - name: Run target-cloudberry integration tests
        run: |
          cargo test -p cloudberry-etl-target-cloudberry \
            --test cloudberry21 \
            --test schema_event_cloudberry21 \
            --test chunk_ledger_cloudberry21 \
            -- --ignored --nocapture
        env:
          PG2CB_TEST_TARGET_DSN: postgres://gpadmin@127.0.0.1:55433/target
          RUST_LOG: info

      - name: Run cross-database snapshot E2E
        run: |
          cargo test -p cloudberry-etl-engine \
            --test snapshot_e2e \
            --test phase1_recovery_e2e \
            --test schema_transition_e2e \
            -- --ignored --nocapture
        env:
          PG2CB_TEST_SOURCE_DSN: postgres://postgres:pg2cb_test@127.0.0.1:5432/source
          PG2CB_TEST_TARGET_DSN: postgres://gpadmin@127.0.0.1:55433/target
          RUST_LOG: info

  web-checks:
    name: Web Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install and build web
        working-directory: web
        run: |
          npm install
          npm run build
